apiVersion: apps/v1
kind: Deployment
metadata:
  name: axis-swgi-operator
  namespace: swgi-system
  labels:
    app.kubernetes.io/name: axis-swgi-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: axis-swgi-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: axis-swgi-operator
    spec:
      serviceAccountName: axis-swgi-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: axis-swgi-operator
          image: registry.connect.redhat.com/axissystems/axis-swgi-operator:0.1.0
          imagePullPolicy: IfNotPresent
          command:
            - kopf
          args:
            - run
            - /opt/app-root/src/axis-swgi-operator/controller/main.py
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 10001
